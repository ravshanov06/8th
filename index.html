<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematika O'qitish Metodikasi · 50 savol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0e12;
            color: #f0f2f6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .quiz-container {
            background: #161822;
            border: 1px solid #26293b;
            border-radius: 18px;
            padding: 28px 32px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            max-height: 98vh;
            overflow-y: auto;
        }
        .quiz-container::-webkit-scrollbar { width: 4px; }
        .quiz-container::-webkit-scrollbar-track { background: #161822; }
        .quiz-container::-webkit-scrollbar-thumb { background: #2e334c; border-radius: 10px; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .progress-bar {
            font-size: 0.78rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .score-display { color: #10b981; font-weight: 600; }
        .section-badge {
            display: inline-block;
            background: #1f2a3f;
            padding: 3px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #8db0e0;
            letter-spacing: 0.4px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 22px;
            color: #f3f5f9;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .option-btn {
            background: transparent;
            border: 1px solid #2e334c;
            color: #e8ecf5;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            width: 100%;
            line-height: 1.5;
        }
        .option-btn:hover:not(:disabled) {
            background: #1f2235;
            border-color: #6a7fa0;
        }
        .option-btn.correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.incorrect {
            background: rgba(239,68,68,0.16) !important;
            border-color: #ef4444 !important;
            color: #f87171;
        }
        .option-btn.show-correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.disabled { pointer-events: none; opacity: 0.8; }
        .option-btn.correct.disabled { opacity: 1; }
        .option-btn.show-correct.disabled { opacity: 1; }
        .next-btn-container {
            margin-top: 22px;
            display: flex;
            justify-content: flex-end;
        }
        .next-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }
        .next-btn:hover { opacity: 0.85; transform: scale(1.02); }
        .next-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .score-screen { text-align: center; padding: 30px 0; }
        .score-screen h2 { font-size: 2.2rem; margin-bottom: 8px; }
        .final-score { font-size: 1.2rem; color: #9ca3af; margin-bottom: 30px; }
        .final-score span { color: #10b981; font-weight: 700; font-size: 1.8rem; }
        .restart-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }
        .restart-btn:hover { opacity: 0.85; }
        @media (max-width: 600px) {
            .quiz-container { padding: 16px; }
            .question-text { font-size: 1.05rem; }
            .option-btn { font-size: 0.85rem; padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="top-bar">
            <div class="progress-bar" id="progress">Savol 1 / 50</div>
            <div class="progress-bar score-display" id="scoreDisplay">✅ 0</div>
        </div>
        <div class="section-badge" id="sectionBadge">Matematika O'qitish Metodikasi</div>
        <div class="question-text" id="question"></div>
        <div class="options-container" id="options"></div>
        <div class="next-btn-container">
            <button class="next-btn" id="nextBtn" disabled>Keyingi →</button>
        </div>
    </div>

    <script>
        const QUIZ_DATA = [
            { q: "|x+1|+|x-3|=8 tenglama haqida qaysi mulohaza to'g'ri?", opts: ["Ildizlari turli ishorali", "Faqat bitta ildizi bor", "Har ikkala ildiz manfiy", "Har ikkala ildiz musbat"], correct: 0 },
            { q: "{ax+by=6, bx+ay=6} sistema x=3, y=2 yechimga ega bo'lsa a?", opts: ["2", "4.5", "5.7", "3.3"], correct: 0 },
            { q: "x^{lg25} + 25^{lgx} = 10 tenglamani yeching:", opts: ["√10", "10", "1", "100"], correct: 0 },
            { q: "x²-10x+q=0 ildizlaridan biri 5 ga teng. Koeffitsientlar yig'indisi?", opts: ["16", "15.5", "36.7", "35.7"], correct: 0 },
            { q: "ln(x-1)=x-3 tenglamaning nechta ildizi bor?", opts: ["2", "1", "3", "Ildizi yo'q"], correct: 0 },
            { q: "|x²-3|=a tenglama a ning qanday qiymatida uchta ildizga ega?", opts: ["3", "9.3", "-2.6", "-3.6"], correct: 0 },
            { q: "√(5-x²) > x-1 tengsizlikni qanoatlantiruvchi butun sonlar nechta?", opts: ["4", "5", "3", "1"], correct: 0 },
            { q: "log_{1/√2}((4x-1)/(4x+8)) < 0 tengsizlikni yeching:", opts: ["(-∞;-2)", "(1/4;∞)", "(2;∞)", "(-2;1/4)"], correct: 0 },
            { q: "√a-√b=3 va a-b=24 bo'lsa, √a+√b?", opts: ["8", "4.5", "5.5", "6.7"], correct: 0 },
            { q: "b va c ning qanday qiymatlarida M(-8;-23) nuqta y=x²+bx+c parabolaning uchi?", opts: ["b=16,c=41", "b=41,c=16", "b=-16,c=41", "b=34,c=14"], correct: 0 },
            { q: "594 va 378 ning umumiy bo'luvchilari nechta?", opts: ["8", "9", "7", "6"], correct: 0 },
            { q: "6 ga karrali ikki xonali natural sonlar nechta?", opts: ["15", "13", "11", "12"], correct: 0 },
            { q: "Algebra fanining asoschisi?", opts: ["Muhammad al-Xorazmiy", "A.R.Beruniy", "A.N.Forobiy", "Ali Qushchi"], correct: 0 },
            { q: "Algoritm termini qaysi olim nomidan olingan?", opts: ["Al-Xorazmiy", "Al-Farg'oniy", "A.R.Beruniy", "Ali Qushchi"], correct: 0 },
            { q: "An'anaviy o'qitish usullari?", opts: ["Suhbat, hikoya, mustaqil ish", "Hikoya (ma'ruza)", "Hikoya va mustaqil ish", "Suhbat va mustaqil ish"], correct: 0 },
            { q: "An'anaviy ta'limning kamchiligi?", opts: ["Aqliy, ijodiy bilim olishni yetarli ta'minlamaydi", "Zamonaviy talablarga javob bermaydi", "Faqat darslikka asoslanadi", "O'quvchining maqsadlari inobatga olinmaydi"], correct: 0 },
            { q: "Asosiy ta'lim shakli?", opts: ["Dars", "Ekskursiya", "To'garak", "Laboratoriya"], correct: 0 },
            { q: "Pedagogik texnologiya nima?", opts: ["O'quv-tarbiyaviy jarayonni tizimli ta'minlaydigan tadbirlar", "Tarbiya usuli", "Ta'lim texnologiyasi", "Ishontirish uslubi"], correct: 0 },
            { q: "10 m balandlikdagi simyog'ochga shilliqqurt kun 5 m ko'tarilib, kechasi 4 m tushsa, necha kunda uchiga chiqadi?", opts: ["6", "5", "4", "3"], correct: 0 },
            { q: "Butun fan bo'yicha yutuqlarni aniqlash va baholash?", opts: ["Yakuniy nazorat", "Joriy nazorat", "Oraliq nazorat", "Tashqi nazorat"], correct: 0 },
            { q: "Dars konspektida qanday maqsadlar ko'rsatiladi?", opts: ["Ta'limiy, tarbiyaviy, rivojlantiruvchi", "Ilmiy, tarbiyaviy", "Ta'limiy, rivojlantiruvchi", "Ta'limiy, ijodiy"], correct: 0 },
            { q: "Davlat ta'lim standarti asosida belgilangan nashr?", opts: ["Darslik", "O'quv qo'llanma", "Ma'ruzalar kursi", "Ilmiy adabiyot"], correct: 0 },
            { q: "Didaktik tamoyillar?", opts: ["Ta'limda asoslaniladigan qonun-qoidalar", "Pedagogik texnologiyalar", "Metodik sistema", "Nazariy bilimlar tizimi"], correct: 0 },
            { q: "Eng kichik natural son?", opts: ["1", "2", "3", "0"], correct: 0 },
            { q: "Eng kichik toq tub son?", opts: ["3", "1", "2", "0"], correct: 0 },
            { q: "Eng kichik tub son?", opts: ["2", "1", "3", "0"], correct: 0 },
            { q: "Evklidning 'Negizlar' asari nechta kitobdan iborat?", opts: ["13", "11", "17", "12"], correct: 0 },
            { q: "Go'sht qaynatilganda 40% yo'qotadi. 6 kg pishgan go'sht uchun qancha kerak?", opts: ["10 kg", "9 kg", "8 kg", "7 kg"], correct: 0 },
            { q: "Kompyuter texnologiyasiga asoslangan adabiyot?", opts: ["Elektron qo'llanma", "Elektron adabiyot", "Elektron to'plam", "Ma'lumotlar banki"], correct: 0 },
            { q: "Kuzatish va tajriba qaysi fanlarni o'rganishda asosiy?", opts: ["Fizika, kimyo, biologiya", "Ekologiya, matematika", "Ona-tili, chet-tili", "Matematika, mehnat"], correct: 0 },
            { q: "Matematik jadvallar turlari?", opts: ["Illyustrativ, ishchi, ma'lumot beruvchi", "Illyustrativ, ishchi", "Ma'lumot beruvchi", "Ishchi, ma'lumot beruvchi"], correct: 0 },
            { q: "O'quvchilar faolligini oshirish omili?", opts: ["Mustaqil ishlar", "Ekskursiya", "Ko'rgazmali qurollar", "Uyga vazifa"], correct: 0 },
            { q: "Sinf o'quvchilari necha guruhga bo'linadi?", opts: ["Uchta", "To'rtta", "Ikkita", "Ikkita (yaxshi va o'rta)"], correct: 0 },
            { q: "Matematik xulosa chiqarish turlari?", opts: ["Induksiya, deduksiya, analogiya", "Induksiya, deduksiya", "Deduksiya, analogiya", "Induksiya, analogiya"], correct: 0 },
            { q: "Matematika darsi turlari?", opts: ["Yangi mavzu, mustahkamlash, tekshirish, takrorlash", "Mustahkamlash", "Tekshirish", "Takrorlash"], correct: 0 },
            { q: "Darsning ta'limiy maqsadi?", opts: ["Bilim, ko'nikma, malaka shakllantirish", "Zamonaviy bilim berish", "Dunyoqarash shakllantirish", "Tayyor bilimlarni yetkazish"], correct: 0 },
            { q: "Matematika o'qitish metodikasi bo'limlari?", opts: ["Umumiy, xususiy, maxsus", "Umumiy, oliy, o'rta", "Oliy, o'rta, boshlang'ich", "Umumiy, maktab, maktabgacha"], correct: 0 },
            { q: "Matematika o'qitish usullari natijasida nima tarkib toptiriladi?", opts: ["Bilim, ko'nikma va malakalar", "Bilim va tushuncha", "Bilim, malaka va ko'nikma", "Ko'nikma va malakalar"], correct: 0 },
            { q: "Masalaning funksiyalari?", opts: ["Didaktik, bilish, rivojlantirish", "Didaktik, tarbiyaviy", "Rivojlantirish, bilish", "Didaktik, rivojlantirish"], correct: 0 },
            { q: "Matematika o'qitishning ilmiy usullari?", opts: ["Kuzatish, tajriba, taqqoslash, umumlashtirish", "Induksiya, deduksiya", "Taqqoslash, umumlashtirish", "Kuzatish va tajriba"], correct: 0 },
            { q: "'Matematika qiroli' nomini olgan nemis matematigi?", opts: ["Gauss", "Vershtras", "Leybnits", "Gilbert"], correct: 0 },
            { q: "Matematikadan uy vazifasini berishdan maqsad?", opts: ["Mustaqil ishlash, mustahkamlash, oila bilan aloqa", "Faqat mustaqil ish", "Faqat mustahkamlash", "Ko'rgazma qurol tayyorlash"], correct: 0 },
            { q: "Didaktik tamoyillar to'liq ko'rsatilgan javob?", opts: ["Ilmiylik, ko'rgazmalilik, onglilik, faollik, tizimlilik", "Ilmiylik, ko'rsatmalilik", "Ilmiylik, onglilik", "Onglilik, faollik"], correct: 0 },
            { q: "Metodik sistema komponentalari?", opts: ["Maqsad, mazmun, usullar, vositalar, shakllar", "Maqsad, mazmun", "Maqsad, mazmun, usullar, vositalar", "Usullar, vositalar, shakllar"], correct: 0 },
            { q: "Uchta klassik masaladan keyingi eng mashhur muammo?", opts: ["Ferma teoremasi", "Viet teoremasi", "Gilbert muammosi", "Eyler muammosi"], correct: 0 },
            { q: "Ta'rifda qanday tushunchalar orasidagi munosabat ko'rsatiladi?", opts: ["Ta'riflanuvchi va ta'riflovchi", "Ta'riflanuvchi", "Ta'riflovchi", "Umuman munosabat ko'rsatilmaydi"], correct: 0 },
            { q: "Umumiy o'rta ta'lim maktablarida V-IX sinflarda matematika darsi uchun necha soat ajratilgan?", opts: ["5", "6", "4", "7"], correct: 0 },
            { q: "Tushunchalar asosida hosil qilingan matematik fikrni tasdiqlash yoki inkor qilish nima deyiladi?", opts: ["Matematik hukm", "Mulohaza", "Matematik tushuncha", "Tasavvur"], correct: 0 },
            { q: "Matematika o'qitishda masalaning funksiyalari qanday?", opts: ["Didaktik, bilish, rivojlantirish", "Didaktik, tarbiyaviy", "Rivojlantirish, bilish", "Didaktik, rivojlantirish"], correct: 0 },
            { q: "Matematik ta'limni amalga oshirishda qanday xulosa chiqarishdan keng foydalaniladi?", opts: ["Induksiya, deduksiya, analogiya", "Induksiya, deduksiya", "Deduksiya, analogiya", "Induksiya, analogiya"], correct: 0 }
        ];

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let questions = shuffle([...QUIZ_DATA]);
        let current = 0, correct = 0, answered = false;

        const quizEl = document.getElementById('quiz');
        const progressEl = document.getElementById('progress');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const sectionBadge = document.getElementById('sectionBadge');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('nextBtn');

        function render() {
            if (current >= questions.length) { showScore(); return; }
            const q = questions[current];
            progressEl.textContent = `Savol ${current+1} / ${questions.length}`;
            scoreDisplay.textContent = `✅ ${correct}`;
            sectionBadge.textContent = "Matematika O'qitish Metodikasi";
            questionEl.textContent = q.q;
            optionsEl.innerHTML = '';
            const opts = q.opts.map((t, i) => ({ text: t, isCorrect: i === q.correct }));
            shuffle(opts);
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.dataset.correct = opt.isCorrect;
                btn.addEventListener('click', () => handleClick(btn, opt.isCorrect));
                optionsEl.appendChild(btn);
            });
            nextBtn.disabled = true;
            answered = false;
            nextBtn.textContent = current === questions.length - 1 ? '🏁 Yakunlash' : 'Keyingi →';
        }

        function handleClick(btn, isCorrect) {
            if (answered) return;
            answered = true;
            const all = optionsEl.querySelectorAll('.option-btn');
            all.forEach(b => b.classList.add('disabled'));
            all.forEach(b => { if (b.dataset.correct === 'true') b.classList.add('show-correct'); });
            if (isCorrect) { btn.classList.add('correct'); correct++; } else { btn.classList.add('incorrect'); }
            nextBtn.disabled = false;
        }

        function nextQuestion() { if (!answered) return; current++; render(); }

        function showScore() {
            const pct = Math.round((correct / questions.length) * 100);
            const emoji = pct >= 80 ? '🌟' : pct >= 60 ? '💪' : pct >= 40 ? '📚' : '😢';
            quizEl.innerHTML = `
                <div class="score-screen">
                    <h2>${emoji} Test yakunlandi!</h2>
                    <div class="final-score">
                        To‘g‘ri javoblar: <span>${correct}</span> / ${questions.length}
                        <br><span style="font-size:1rem;color:#9ca3af;">(${pct}%)</span>
                    </div>
                    <button class="restart-btn" onclick="location.reload()">🔄 Qayta boshlash</button>
                </div>
            `;
        }

        nextBtn.addEventListener('click', nextQuestion);
        render();
    </script>
</body>
</html>
