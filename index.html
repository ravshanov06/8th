<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Differensial Geometriya va Topologiya · 50 savol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0e12;
            color: #f0f2f6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .quiz-container {
            background: #161822;
            border: 1px solid #26293b;
            border-radius: 18px;
            padding: 28px 32px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            max-height: 98vh;
            overflow-y: auto;
        }
        .quiz-container::-webkit-scrollbar { width: 4px; }
        .quiz-container::-webkit-scrollbar-track { background: #161822; }
        .quiz-container::-webkit-scrollbar-thumb { background: #2e334c; border-radius: 10px; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .progress-bar {
            font-size: 0.78rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .score-display { color: #10b981; font-weight: 600; }
        .section-badge {
            display: inline-block;
            background: #1f2a3f;
            padding: 3px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #8db0e0;
            letter-spacing: 0.4px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 22px;
            color: #f3f5f9;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .option-btn {
            background: transparent;
            border: 1px solid #2e334c;
            color: #e8ecf5;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            width: 100%;
            line-height: 1.5;
        }
        .option-btn:hover:not(:disabled) {
            background: #1f2235;
            border-color: #6a7fa0;
        }
        .option-btn.correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.incorrect {
            background: rgba(239,68,68,0.16) !important;
            border-color: #ef4444 !important;
            color: #f87171;
        }
        .option-btn.show-correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.disabled { pointer-events: none; opacity: 0.8; }
        .option-btn.correct.disabled { opacity: 1; }
        .option-btn.show-correct.disabled { opacity: 1; }
        .next-btn-container {
            margin-top: 22px;
            display: flex;
            justify-content: flex-end;
        }
        .next-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }
        .next-btn:hover { opacity: 0.85; transform: scale(1.02); }
        .next-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .score-screen { text-align: center; padding: 30px 0; }
        .score-screen h2 { font-size: 2.2rem; margin-bottom: 8px; }
        .final-score { font-size: 1.2rem; color: #9ca3af; margin-bottom: 30px; }
        .final-score span { color: #10b981; font-weight: 700; font-size: 1.8rem; }
        .restart-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }
        .restart-btn:hover { opacity: 0.85; }
        @media (max-width: 600px) {
            .quiz-container { padding: 16px; }
            .question-text { font-size: 1.05rem; }
            .option-btn { font-size: 0.85rem; padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="top-bar">
            <div class="progress-bar" id="progress">Savol 1 / 50</div>
            <div class="progress-bar score-display" id="scoreDisplay">✅ 0</div>
        </div>
        <div class="section-badge" id="sectionBadge">Differensial Geometriya va Topologiya</div>
        <div class="question-text" id="question"></div>
        <div class="options-container" id="options"></div>
        <div class="next-btn-container">
            <button class="next-btn" id="nextBtn" disabled>Keyingi →</button>
        </div>
    </div>

    <script>
        const QUIZ_DATA = [
            { q: "Koordinatalar sistemasida ort deb qanday vektorga aytiladi?", opts: ["Koordinata o'qi bilan yo'nalishi bir xil va moduli 1", "Moduli 1 ga teng", "Moduli 0 ga teng", "Yo'nalishi teskari"], correct: 0 },
            { q: "Vektor funksiyaning geometrik obraziga mos chiziq?", opts: ["Godograf", "Chiziq", "Uzluksiz chiziq", "Buralish"], correct: 0 },
            { q: "Chiziqning silliq bo'lmagan nuqtasi ... deyiladi.", opts: ["Maxsus nuqtasi", "Silliq nuqtasi", "Urinma nuqtasi", "Sinish nuqtasi"], correct: 0 },
            { q: "Yopishma tekislikka ... bo'lgan normal binormal deyiladi.", opts: ["Perpendikulyar", "Parallel", "Kollinear", "Urinma"], correct: 0 },
            { q: "Yopishma tekislikda ... normal bosh normal deyiladi.", opts: ["Yotuvchi", "Perpendikulyar", "Yotmagan", "Kollinear"], correct: 0 },
            { q: "Agar to'plam tekislikdagi bir bog'lamli sohaning gomeomorfizmdagi obrazi bo'lsa, ... sirt deyiladi.", opts: ["Sodda", "Murakkab", "Lokal sodda", "Silliq"], correct: 0 },
            { q: "Silliq elementar egri chiziq nima?", opts: ["Elementar egri chiziqni differensiallanuvchi funksiyalar yordamida parametrlash mumkin", "Elementar egri chiziqni uzluksiz", "Funksiyalar yordamida parametrlash mumkin", "Yuqoridagilarning biri"], correct: 0 },
            { q: "Har qanday sodda egri chiziq yo elementar egri chiziq yoki ...", opts: ["Ellipsga gomeomorf", "Giperbolaga gomeomorf", "Parabolaga gomeomorf", "Barcha javoblar to'g'ri"], correct: 0 },
            { q: "Quyidagi chiziqlardan qaysi biri elementar egri chiziqqa misol?", opts: ["Parabola", "Giperbola", "Ellips", "Hammasi"], correct: 0 },
            { q: "Quyidagi chiziqlardan qaysi biri sodda egri chiziqqa misol?", opts: ["Ellips", "Kesishuvchi ikkita to'g'ri chiziq", "Giperbola", "Hammasi"], correct: 0 },
            { q: "Regulyar egri chiziq o'ziga tegishli har qanday nuqta atrofida ...", opts: ["To'g'rilanuvchi", "Uzluksiz", "Differensiallanuvchi", "Chegaralanuvchi"], correct: 0 },
            { q: "Chiziqning nuqtasidagi normal tekisligi deb ...", opts: ["Nuqtada o'tkazilgan urinmaga perpendikulyar tekislik", "Nuqtada o'tkazilgan urinmaga parallel tekislik", "Nuqtada o'tkazilgan urinmaga aytiladi", "Nuqtada o'tkazilgan tekislikka aytiladi"], correct: 0 },
            { q: "Bosh normal deb ... aytiladi.", opts: ["Yopishma tekislikda yotuvchi normalga", "Yopishma tekislikka perpendikulyar normalga", "Yopishma tekislikka parallel tekislikda", "Urinmaga perpendikulyar to'g'ri chiziqqa"], correct: 0 },
            { q: "Boshnormal va binormaldan o'tuvchi tekislik ... deyiladi.", opts: ["Normal tekislik", "To'g'rilovchi tekislik", "Yopishma tekislik", "Silliq tekislik"], correct: 0 },
            { q: "To'g'rilovchi tekislik deb ... aytiladi.", opts: ["Urinma bilan binormaldan o'tuvchi tekislik", "Boshnormal va binormaldan o'tuvchi tekislik", "Urinma bilan boshnormaldan o'tuvchi tekislik", "Urinmaga perpendikulyar tekislik"], correct: 0 },
            { q: "Kamida ikki marta uzluksiz differensiallanuvchi chiziqning har bir nuqtasida ... mavjud.", opts: ["Egriligi", "Buralishi", "Urinmasi", "Binormali"], correct: 0 },
            { q: "Chiziqning buralishi nolga teng bo'lish sharti?", opts: ["Tekislikda yotsa", "Fazoda yotsa", "To'g'ri chiziqda yotsa", "Egri chiziqda yotsa"], correct: 0 },
            { q: "Soha deb ... aytiladi.", opts: ["Tekislikdagi ochiq doiraga gomeomorf to'plam", "Tekislikdagi yopiq doiraga gomeomorf", "Tekislikdagi yopiq doiraga", "Barcha javoblar to'g'ri"], correct: 0 },
            { q: "Har qanday elementar sirt ... sirtdir.", opts: ["Sodda", "Silliq", "Qavariq", "Murakkab"], correct: 0 },
            { q: "Sodda, lekin elementar bo'lmagan sirt?", opts: ["Sfera", "Elliptik paraboloid", "Doira", "Tekislik"], correct: 0 },
            { q: "Har qanday tekislik ... sirtdir.", opts: ["Barcha javoblar to'g'ri", "Silliq", "Sodda", "Elementar"], correct: 0 },
            { q: "Elementar sirt bo'lmagan?", opts: ["Silindr", "Tekislik", "Elliptik paraboloid", "Giperbolik paraboloid"], correct: 0 },
            { q: "Bosh yo'nalishga mos keluvchi normal egriliklar ... deyiladi.", opts: ["Bosh egriliklar", "Birlik egriliklar", "Normal", "Egriliklar"], correct: 0 },
            { q: "Matritsaning xos sonlari har xil bo'lganda xos vektorlar ...", opts: ["O'zaro perpendikulyar", "O'zaro parallel", "O'zaro teskari", "O'zaro teng"], correct: 0 },
            { q: "Xausdorf fazosida har qanday yaqinlashuvchi ketma-ketlikning limiti ...", opts: ["Yagona", "Cheksiz ko'p", "Mavjud emas", "Chekli"], correct: 0 },
            { q: "Bog'lanishli to'plamning yopig'i ...", opts: ["Bog'lanishli to'plam", "Bog'lanishsiz to'plam", "Bog'lanishli bo'lishi ham bo'lmasligi ham mumkin", "Kompakt to'plam"], correct: 0 },
            { q: "To'g'ri tasdiqni toping:", opts: ["Bog'lanishlilik komponentasi yopiq to'plam", "Bog'lanishlilik komponentasi ochiq to'plam", "Ochiq ham yopiq ham bo'lishi mumkin", "Ochiq bo'lishi va yopiq bo'lmasligi mumkin"], correct: 0 },
            { q: "Xausdorf fazosidagi har qanday kompakt to'plam ...", opts: ["Yopiq to'plam", "Bog'lanishli to'plam", "Bog'lanishli", "Ochiq to'plam"], correct: 0 },
            { q: "Kompakt to'plamning uzluksiz akslantirishdagi obrazi ...", opts: ["Kompakt to'plam bo'ladi", "Bog'lanishli", "Yopiq", "Ochiq"], correct: 0 },
            { q: "Topologik fazo tushunchasini birinchi marta kim kiritgan?", opts: ["F. Hausdorf", "G. Kantor", "A. Puankare", "D. Gilbert"], correct: 0 },
            { q: "Metrik fazoda yaqinlashuvchi ketma-ketlikning limiti ...", opts: ["Yagona", "Ikkita", "Cheksiz ko'p", "Mavjud emas"], correct: 0 },
            { q: "To'liq metrik fazo qanday xossaga ega?", opts: ["Har bir fundamental ketma-ketlik yaqinlashuvchi", "Har bir yaqinlashuvchi ketma-ketlik fundamental", "Chegaralangan", "Kompakt"], correct: 0 },
            { q: "Evklid fazosi Rⁿ qanday fazo?", opts: ["To'liq metrik fazo", "To'liq emas", "Diskret", "Kompakt"], correct: 0 },
            { q: "Xausdorf fazosida ixtiyoriy ikki nuqtani ...", opts: ["Ajratish mumkin", "Ajratish mumkin emas", "Ba'zan ajratish mumkin", "Hech qachon ajratish mumkin emas"], correct: 0 },
            { q: "Bir nuqtali to'plam qanday to'plam?", opts: ["Yopiq", "Ochiq", "Ham ochiq ham yopiq", "Na ochiq na yopiq"], correct: 0 },
            { q: "Ochiq to'plamning to'ldiruvchisi qanday to'plam?", opts: ["Yopiq", "Ochiq", "Ham ochiq ham yopiq", "Na ochiq na yopiq"], correct: 0 },
            { q: "Yopiq to'plamning to'ldiruvchisi qanday to'plam?", opts: ["Ochiq", "Yopiq", "Ham ochiq ham yopiq", "Na ochiq na yopiq"], correct: 0 },
            { q: "Kompakt to'plamning xossasi?", opts: ["Chegaralangan va yopiq", "Chegaralangan", "Yopiq", "Ochiq"], correct: 0 },
            { q: "R da kompakt to'plam qanday bo'ladi?", opts: ["Chegaralangan va yopiq", "Chegaralangan", "Yopiq", "Ochiq"], correct: 0 },
            { q: "Metrik fazoda izolyatsiyalangan nuqta ...", opts: ["O'ziga tegishli ochiq to'plam mavjud", "O'ziga tegishli yopiq to'plam mavjud", "Chegaralangan", "Kompakt"], correct: 0 },
            { q: "Silliq sirt qanday xossaga ega?", opts: ["Har bir nuqtada urinma tekislikka ega", "Har bir nuqtada urinma chiziqqa ega", "Har bir nuqtada normalga ega", "Barchasi"], correct: 0 },
            { q: "Regulyar sirt nima?", opts: ["Har bir nuqtada urinma tekislikka ega va silliq", "Silliq", "Uzluksiz", "Differensiallanuvchi"], correct: 0 },
            { q: "Sirtning birinchi fundamental formasi nima?", opts: ["Metrikani aniqlaydi", "Egrilikni aniqlaydi", "Buralishni aniqlaydi", "Normalni aniqlaydi"], correct: 0 },
            { q: "Sirtning ikkinchi fundamental formasi nima?", opts: ["Egrilikni aniqlaydi", "Metrikani aniqlaydi", "Buralishni aniqlaydi", "Normalni aniqlaydi"], correct: 0 },
            { q: "Gauss egriligi K = ?", opts: ["(LN-M²)/(EG-F²)", "(EG-F²)/(LN-M²)", "(LN+M²)/(EG-F²)", "(EG+F²)/(LN-M²)"], correct: 0 },
            { q: "O'rtacha egrilik H = ?", opts: ["(EN-2FM+GL)/(2(EG-F²))", "(EN+2FM+GL)/(2(EG-F²))", "(EN-2FM+GL)/(EG-F²)", "(EN+2FM+GL)/(EG-F²)"], correct: 0 },
            { q: "Sfera sirtining Gauss egriligi?", opts: ["1/R²", "-1/R²", "0", "R²"], correct: 0 },
            { q: "Tekislik sirtining Gauss egriligi?", opts: ["0", "1", "-1", "∞"], correct: 0 },
            { q: "Silindr sirtining Gauss egriligi?", opts: ["0", "1/R²", "-1/R²", "R²"], correct: 0 },
            { q: "Sirtning geodezik chiziqlari qanday xossaga ega?", opts: ["Eng qisqa masofa", "Eng uzoq masofa", "Egriligi nol", "Buralishi nol"], correct: 0 }
        ];

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let questions = shuffle([...QUIZ_DATA]);
        let current = 0, correct = 0, answered = false;

        const quizEl = document.getElementById('quiz');
        const progressEl = document.getElementById('progress');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const sectionBadge = document.getElementById('sectionBadge');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('nextBtn');

        function render() {
            if (current >= questions.length) { showScore(); return; }
            const q = questions[current];
            progressEl.textContent = `Savol ${current+1} / ${questions.length}`;
            scoreDisplay.textContent = `✅ ${correct}`;
            sectionBadge.textContent = "Differensial Geometriya va Topologiya";
            questionEl.textContent = q.q;
            optionsEl.innerHTML = '';
            const opts = q.opts.map((t, i) => ({ text: t, isCorrect: i === q.correct }));
            shuffle(opts);
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.dataset.correct = opt.isCorrect;
                btn.addEventListener('click', () => handleClick(btn, opt.isCorrect));
                optionsEl.appendChild(btn);
            });
            nextBtn.disabled = true;
            answered = false;
            nextBtn.textContent = current === questions.length - 1 ? '🏁 Yakunlash' : 'Keyingi →';
        }

        function handleClick(btn, isCorrect) {
            if (answered) return;
            answered = true;
            const all = optionsEl.querySelectorAll('.option-btn');
            all.forEach(b => b.classList.add('disabled'));
            all.forEach(b => { if (b.dataset.correct === 'true') b.classList.add('show-correct'); });
            if (isCorrect) { btn.classList.add('correct'); correct++; } else { btn.classList.add('incorrect'); }
            nextBtn.disabled = false;
        }

        function nextQuestion() { if (!answered) return; current++; render(); }

        function showScore() {
            const pct = Math.round((correct / questions.length) * 100);
            const emoji = pct >= 80 ? '🌟' : pct >= 60 ? '💪' : pct >= 40 ? '📚' : '😢';
            quizEl.innerHTML = `
                <div class="score-screen">
                    <h2>${emoji} Test yakunlandi!</h2>
                    <div class="final-score">
                        To‘g‘ri javoblar: <span>${correct}</span> / ${questions.length}
                        <br><span style="font-size:1rem;color:#9ca3af;">(${pct}%)</span>
                    </div>
                    <button class="restart-btn" onclick="location.reload()">🔄 Qayta boshlash</button>
                </div>
            `;
        }

        nextBtn.addEventListener('click', nextQuestion);
        render();
    </script>
</body>
</html>
